# CI — docs/11 §4: typecheck → lint → vitest → audit → gitleaks → build.
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
        continue-on-error: true # advisory pre-revenue; fail-on-high enforced at M8
      - name: service-role leak guard (docs/07 §1)
        run: |
          if grep -rn "SUPABASE_SERVICE_ROLE_KEY" app components lib --include='*.tsx' --include='*.ts' | grep -v "server only" | grep -vE "lib/(supabase/server|rate-limit)"; then
            echo "service-role key referenced outside server-only modules" && exit 1
          fi
      - run: npm run build

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
